<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업형 연습하기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .hub-container {
            width: 100%;
            max-width: 650px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            color: #1a3c6c;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 35px;
        }
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 25px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-decoration: none;
            color: #334155;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s ease-in-out;
        }
        .menu-card:hover {
            background-color: #1a3c6c;
            color: #ffffff;
            border-color: #1a3c6c;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(26, 60, 108, 0.15);
        }
        .badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: normal;
        }
        .menu-card:hover .badge {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
        .badge-25 { background-color: #e0f2fe; color: #0369a1; }
        .badge-24 { background-color: #fef3c7; color: #b45309; }
        
        .arrow {
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>작업형 연습하기</h1>
    <div class="subtitle">연습할 문항의 링크를 선택하시면 해당 문제 페이지로 이동합니다.</div>

    <div class="link-grid">
        <!-- 23년도 예선 문항 -->
        <a href="test23.html" class="menu-card">
            <div>
                <span class="badge badge-25">2023 예선</span>&nbsp;
                <span>test23.html</span>
            </div>
            <span class="arrow">➔</span>
        </a>
    
    <div class="link-grid">
        <!-- 25년도 예선 문항 -->
        <a href="25_20.html" class="menu-card">
            <div>
                <span class="badge badge-25">2025 예선</span>&nbsp;
                <span>25예선20.html</span>
            </div>
            <span class="arrow">➔</span>
        </a>

        <a href="25_21.html" class="menu-card">
            <div>
                <span class="badge badge-25">2025 예선</span>&nbsp;
                <span>25예선21.html</span>
            </div>
            <span class="arrow">➔</span>
        </a>

        <!-- 24년도 예선 문항 -->
        <a href="24_20.html" class="menu-card">
            <div>
                <span class="badge badge-24">2024 예선</span>&nbsp;
                <span>24예선20.html</span>
            </div>
            <span class="arrow">➔</span>
        </a>

        <a href="24_21.html" class="menu-card">
            <div>
                <span class="badge badge-24">2024 예선</span>&nbsp;
                <span>24예선21.html</span>
            </div>
            <span class="arrow">➔</span>
        </a>
    </div>
</div>

</body>
</html>
